name: Build ISO

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixos-24.11
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Build ISO
        run: nix build .#iso

      - name: Upload ISO
        uses: actions/upload-artifact@v5
        with:
          name: kiosk-os-iso
          path: result/iso/kiosk-os.iso
          retention-days: 30

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixos-24.11
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Build ISO
        run: nix build .#iso

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: result/iso/kiosk-os.iso
          generate_release_notes: true
