# kiosk-os — WiFi Kiosk Example
# A kiosk that connects via WiFi and loads config remotely.

connection=wifi
wifi_ssid=CompanyWiFi
wifi_password=SecretPassword123
dhcp=yes

homepage=https://app.example.com
whitelist=app.example.com|api.example.com

disable_navigation_bar=yes
disable_address_bar=yes
right_mouse_click=no
removable_devices=no
shutdown_menu=no

timezone=Europe/Berlin
primary_keyboard_layout=de

session_idle=10
dpms_idle=30
