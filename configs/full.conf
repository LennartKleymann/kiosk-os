# =============================================================================
# kiosk-os — Full Configuration Reference
# =============================================================================
# All available parameters with descriptions and default values.
# Uncomment and modify the parameters you need.

# === Network =================================================================

# Connection type: wired or wifi
connection=wired

# Use DHCP for automatic IP assignment
dhcp=yes

# WiFi settings (only used when connection=wifi)
# wifi_ssid=MyNetwork
# wifi_password=MySecretPassword

# Static IP settings (only used when dhcp=no)
# ip=192.168.1.100
# netmask=255.255.255.0
# gateway=192.168.1.1
# dns=8.8.8.8

# === Browser =================================================================

# Homepage URL (required)
homepage=https://example.com

# Browser mode:
#   kiosk      — no UI at all, completely locked down (default)
#   fullscreen — toolbar visible (back button, address bar), whitelist still protects
browser_mode=kiosk

# Domain whitelist — only these domains are accessible (pipe-separated)
# All other domains will be blocked. Works in both browser modes.
# whitelist=example.com|api.example.com

# Disable right-click context menu
right_mouse_click=no

# === Display =================================================================

# Wallpaper URL — downloaded and displayed behind the browser
# Shown during boot and if the browser crashes
# wallpaper=https://example.com/wallpaper.jpg

# Hide mouse cursor after N seconds of inactivity (0 = never hide)
hide_mouse=5

# Timezone (used for system clock and scheduled actions)
timezone=Europe/Berlin

# Keyboard layout
primary_keyboard_layout=de

# === Power Management ========================================================

# Restart browser session after N minutes of inactivity (0 = disabled)
# This resets the browser to the homepage and clears session data
# session_idle=10

# Turn off display after N minutes of inactivity (0 = disabled)
# Any input (mouse/keyboard/touch) turns it back on instantly
# dpms_idle=60

# Scheduled actions (advanced)
# Format: Day-HH:MM action:command
# Multiple days separated by spaces, command is a shell command
# scheduled_action=Monday-18:00 Tuesday-18:00 Wednesday-18:00 action:shutdown

# === Security ================================================================

# Block USB mass storage devices (keyboards and mice still work)
removable_devices=no

# Disable Ctrl+Alt+Del shutdown menu
shutdown_menu=no

# === Remote Configuration ====================================================

# Remote config URL — fetched on every boot
# If set, the remote config overrides the local config
# kiosk_config=https://example.com/kiosk.txt

# === Administration ==========================================================

# Enable SSH access for remote management
# admin_ssh=no

# SSH public key for the admin user
# admin_ssh_key=ssh-ed25519 AAAA...

# Custom SSH port (default: 22)
# admin_ssh_port=22

# === Installation ============================================================

# Show disk installer when booting from live USB
# The installer requires explicit confirmation before erasing any disk
# auto_install=yes
