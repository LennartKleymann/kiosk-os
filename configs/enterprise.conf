# kiosk-os — Enterprise Example
# Locked-down kiosk with remote config, SSH access, and scheduled actions.

connection=wired
dhcp=yes

homepage=https://intranet.company.com
whitelist=intranet.company.com|auth.company.com|cdn.company.com
wallpaper=https://static.company.com/kiosk-wallpaper.jpg

disable_navigation_bar=yes
disable_address_bar=yes
right_mouse_click=no
removable_devices=no
shutdown_menu=no
hide_mouse=5

timezone=Europe/Berlin
primary_keyboard_layout=de

session_idle=5
dpms_idle=30

kiosk_config=https://static.company.com/kiosk/terminal-01.txt

admin_ssh=yes
admin_ssh_key=ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAI... admin@company.com
